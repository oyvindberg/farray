<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FArray — the fastest persistent sequence on the JVM</title>
    <script>
      // set theme before first paint to avoid a flash
      (function () {
        try {
          var q = new URLSearchParams(location.search).get("theme");
          var t = q || localStorage.getItem("theme");
          if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = t === "dark" ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
    <meta
      name="description"
      content="How an immutable, Array-backed Scala sequence ended up beating List, Vector, fs2.Chunk and zio.Chunk — told through benchmarks and the source that produced them."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
