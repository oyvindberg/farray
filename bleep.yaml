$schema: https://raw.githubusercontent.com/oyvindberg/bleep/master/schema.json
$version: 1.0.0-M10
jvm:
  # match bleep's own JVM; JDK 17 lacks classes google-java-format 1.33.0 needs (JCAnyPattern)
  name: graalvm-community:25.0.1
projects:
  farray:
    dependencies: com.lihaoyi::fansi:0.3.1
    extends: template-common
    platform:
      mainClass: com.foo.App
    sourcegen:
      project: codegen
      main: farray.GenCores
  codegen:
    extends: template-common
    dependencies:
      - build.bleep::bleep-core:${BLEEP_VERSION}
  gensets:
    extends: template-common
    dependencies:
      - build.bleep::bleep-core:${BLEEP_VERSION}
  fset:
    extends: template-common
    dependsOn: farray
    sourcegen:
      project: gensets
      main: farray.GenSets
  fset-tests:
    dependencies:
      - junit:junit:4.13.2
      - com.github.sbt:junit-interface:0.13.2
    dependsOn: fset
    extends: template-common
    isTestProject: true
  tests:
    dependencies:
      - junit:junit:4.13.2
      - com.github.sbt:junit-interface:0.13.2
      - com.github.plokhotnyuk.jsoniter-scala::jsoniter-scala-core:2.31.3
      - com.github.plokhotnyuk.jsoniter-scala::jsoniter-scala-macros:2.31.3
    dependsOn: farray
    extends: template-common
    isTestProject: true
  benchmarks:
    dependsOn: farray
    extends: template-common
    dependencies:
      - com.github.plokhotnyuk.jsoniter-scala::jsoniter-scala-core:2.31.3
      - com.github.plokhotnyuk.jsoniter-scala::jsoniter-scala-macros:2.31.3
      - org.typelevel::jawn-ast:1.4.0
      - com.fasterxml.jackson.core:jackson-databind:2.17.2
      - org.openjdk.jmh:jmh-generator-bytecode:1.36
      - build.bleep::bleep-core:${BLEEP_VERSION}
      - co.fs2::fs2-core:3.11.0
      - dev.zio::zio:2.1.14
  benchmarks-runner:
    dependsOn: benchmarks
    extends: template-common
    platform:
      mainClass: org.openjdk.jmh.Main
    sourcegen:
      project: benchmarks
      main: farray.GenJmh
  # FSet benchmark suite — a PARALLEL of benchmarks/benchmarks-runner, fully split from the FArray suite:
  # its own sources, its own JMH-generated runner (GenSetJmh → setbenchmarks-runner), and its own set
  # competitor deps. Driven by scripts/setbench-run.sh → docs/set-bench-results.json + docs/set-index.html.
  setbenchmarks:
    dependsOn: [farray, fset]
    extends: template-common
    dependencies:
      - org.openjdk.jmh:jmh-generator-bytecode:1.36
      - build.bleep::bleep-core:${BLEEP_VERSION}
      # ---- set-implementation competitors (versions web-verified) ----
      - org.roaringbitmap:RoaringBitmap:1.6.14
      - it.unimi.dsi:fastutil:8.5.18
      - com.carrotsearch:hppc:0.10.0
      - org.eclipse.collections:eclipse-collections:13.0.0
      - org.eclipse.collections:eclipse-collections-api:13.0.0
      - com.google.guava:guava:33.6.0-jre
  setbenchmarks-runner:
    dependsOn: setbenchmarks
    extends: template-common
    platform:
      mainClass: org.openjdk.jmh.Main
    sourcegen:
      project: setbenchmarks
      main: farray.GenSetJmh
  scripts:
    dependencies:
      - build.bleep::bleep-plugin-ci-release:${BLEEP_VERSION}
    platform:
      name: jvm
    scala:
      options: -encoding utf8 -feature -unchecked
      strict: true
      version: 3.8.3
scripts:
  my-publish-local:
    main: PublishLocal
    project: scripts
  publish:
    main: Publish
    project: scripts
templates:
  template-common:
    platform:
      name: jvm
    scala:
      options: -encoding utf8 -feature -unchecked -opt
      strict: true
      version: 3.8.3
